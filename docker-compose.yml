# Local dev: PostgreSQL + MinIO for apps/api Node runtime (PRP Fase 1).
# Ports avoid host collisions (5432/5433/9000 often taken on shared machines).
# Worker + D1 + R2 path remains production until cutover (see DEPLOY.md).

services:
  postgres:
    image: postgres:16-alpine
    container_name: teknovo-web-postgres
    environment:
      POSTGRES_DB: teknovo
      POSTGRES_USER: teknovo
      POSTGRES_PASSWORD: ${PG_PASSWORD:-teknovo}
    volumes:
      - teknovo_web_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teknovo -d teknovo"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: teknovo-web-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - teknovo_web_miniodata:/data
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  teknovo_web_pgdata:
  teknovo_web_miniodata:
