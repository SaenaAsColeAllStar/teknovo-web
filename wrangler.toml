# Cloudflare Workers + OpenNext (@opennextjs/cloudflare)
# Docs: https://opennext.js.org/cloudflare

name = "teknovo-web"
main = ".open-next/worker.js"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Self-reference for ISR / cache revalidation (match `name` above)
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "teknovo-web"

# CMS structured content (berita, artikel, kategori, pengaturan)
[[d1_databases]]
binding = "DB"
database_name = "teknovo-article"
database_id = "3defaaff-95fd-44f2-a85f-c40a1ce85c6e"
migrations_dir = "migrations"

# CMS media uploads + landing assets
[[r2_buckets]]
binding = "CMS_BUCKET"
bucket_name = "teknovo"

# Optional: incremental cache via R2 — uncomment after creating the bucket
# [[r2_buckets]]
# binding = "NEXT_INC_CACHE_R2_BUCKET"
# bucket_name = "teknovo-web-cache"

# Optional: Cloudflare Images binding
# [images]
# binding = "IMAGES"

[vars]
NEXT_PUBLIC_APP_URL = "https://www.smkteknovo.sch.id"
R2_PUBLIC_URL = "https://r2.ctos.web.id"
