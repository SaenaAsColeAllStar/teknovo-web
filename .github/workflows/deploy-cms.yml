name: Deploy CMS Pages (cms.)

on:
  push:
    branches: [main]
    paths:
      - "apps/cms/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-cms.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      # version from package.json packageManager (do not also set version:)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build CMS
        working-directory: apps/cms
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: https://cf.smkteknovo.sch.id/api
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "::warning::VITE_CLERK_PUBLISHABLE_KEY missing — building with placeholder (do not use this artifact in production)."
            export VITE_CLERK_PUBLISHABLE_KEY=pk_test_ci_placeholder
          fi
          pnpm build
      - name: Check Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID missing — build OK, Pages deploy skipped. See DEPLOY.md."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy Pages
        if: steps.cf.outputs.configured == 'true'
        working-directory: apps/cms
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=teknovo-cms
      - name: Skip notice
        if: steps.cf.outputs.configured != 'true'
        run: echo "Deploy skipped (no Cloudflare credentials)."
