name: Rebuild Astro web (apex)

on:
  repository_dispatch:
    types: [rebuild-web]
  workflow_dispatch:
    inputs:
      reason:
        description: Rebuild reason
        required: false
        default: manual

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # version from package.json packageManager (do not also set version:)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build Astro site
        working-directory: apps/web
        env:
          PUBLIC_API_URL: https://cms-api.smkteknovo.sch.id
          PUBLIC_SITE_URL: https://smkteknovo.sch.id
          PUBLIC_R2_URL: https://storage-console.smkteknovo.sch.id/smk-teknovo
        run: pnpm build
      - name: Check Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID missing — build OK, Pages deploy skipped. See DEPLOY.md."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=teknovo-web
      - name: Skip notice
        if: steps.cf.outputs.configured != 'true'
        run: echo "Deploy skipped (no Cloudflare credentials)."
