name: Rebuild Astro web (apex)

on:
  repository_dispatch:
    types: [rebuild-web]
  workflow_dispatch:
    inputs:
      reason:
        description: Rebuild reason
        required: false
        default: manual

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # version from package.json packageManager (do not also set version:)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build Astro site
        working-directory: apps/web
        env:
          PUBLIC_API_URL: https://cf.smkteknovo.sch.id
          PUBLIC_SITE_URL: https://smkteknovo.sch.id
          PUBLIC_R2_URL: https://r2.ctos.web.id
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=teknovo-web
