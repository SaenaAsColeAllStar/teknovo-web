# Optional VPS deploy for Node API (PRP Fase 9.1).
# Does NOT replace Worker deploy (deploy-api.yml). Enable only after Fase 8
# Tunnel + PM2 are ready, and VPS_* secrets are set on the production environment.
#
# Required secrets (environment: production):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY
# Optional secrets/vars:
#   VPS_PORT (default 22), VPS_PATH (default /www/wwwroot/teknovo-web),
#   vars.ENABLE_VPS_DEPLOY=true to auto-run on push to apps/api

name: Deploy API VPS (Node/PM2)

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-api-vps.yml"
      - "scripts/ops/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Gate — VPS secrets + ENABLE flag
        id: gate
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          ENABLE_VPS_DEPLOY: ${{ vars.ENABLE_VPS_DEPLOY }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VPS_HOST / VPS_USER / VPS_SSH_KEY not set — skipping VPS deploy (Worker path unchanged)."
            exit 0
          fi
          # Auto-deploy on push only when explicitly enabled; workflow_dispatch always allowed.
          if [ "$EVENT_NAME" = "push" ] && [ "${ENABLE_VPS_DEPLOY:-}" != "true" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ENABLE_VPS_DEPLOY!=true — skip auto VPS deploy on push. Use workflow_dispatch or set the var."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.configured == 'true'

      - name: Deploy via SSH (rsync + pm2 reload)
        if: steps.gate.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT_SECRET: ${{ secrets.VPS_PORT }}
          VPS_PORT_VAR: ${{ vars.VPS_PORT }}
          VPS_PATH_SECRET: ${{ secrets.VPS_PATH }}
          VPS_PATH_VAR: ${{ vars.VPS_PATH }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT_SECRET:-${VPS_PORT_VAR:-22}}"
          VPS_PATH="${VPS_PATH_SECRET:-${VPS_PATH_VAR:-/www/wwwroot/teknovo-web}}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          RSYNC_SSH="ssh -i ~/.ssh/vps_key -p $VPS_PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          REMOTE="${VPS_USER}@${VPS_HOST}"

          # Sync API + shared package (exclude local env / node_modules / D1 local).
          rsync -az --delete \
            -e "$RSYNC_SSH" \
            --exclude node_modules \
            --exclude .wrangler \
            --exclude .env \
            --exclude .dev.vars \
            --exclude dist \
            apps/api/ "${REMOTE}:${VPS_PATH}/apps/api/"

          rsync -az --delete \
            -e "$RSYNC_SSH" \
            --exclude node_modules \
            packages/shared/ "${REMOTE}:${VPS_PATH}/packages/shared/"

          # Root workspace manifests needed for pnpm on VPS
          rsync -az -e "$RSYNC_SSH" \
            package.json pnpm-lock.yaml pnpm-workspace.yaml \
            "${REMOTE}:${VPS_PATH}/" || true

          $RSYNC_SSH "$REMOTE" bash -s <<REMOTE_SCRIPT
          set -euo pipefail
          cd "${VPS_PATH}"
          export CI=1
          corepack enable || true
          pnpm install --frozen-lockfile --filter @teknovo/api...
          cd apps/api
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy || true
          pnpm exec tsx scripts/deploy-stored-procedures.ts || true
          if command -v pm2 >/dev/null 2>&1; then
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save || true
          else
            echo "pm2 not installed — synced files only"
          fi
          REMOTE_SCRIPT

          rm -f ~/.ssh/vps_key
